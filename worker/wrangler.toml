# Konfigurace Cloudflare Workeru
# Dokumentace: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "rezervacni-system"
main = "src/index.js"
compatibility_date = "2024-01-01"

# workers_dev = true zpřístupní Worker na adrese:
# https://rezervacni-system.VAS-UCET.workers.dev
# Po nasazení tuto adresu zapište do public/config.js
workers_dev = true

# Proměnné, které NEJSOU tajné (lze dát do repozitáře)
# Tajné hodnoty (API klíče, hesla) nastavte přes příkaz:
#   wrangler secret put JMENO_PROMENNE
[vars]
# Sem lze přidat nekritické nastavení
# APP_NAME = "Rezervacni system"

# Volitelně: pokud chcete Worker přiřadit ke konkrétní doméně
# (nastavit až po zakoupení domény v Cloudflare)
# [[routes]]
# pattern = "vasedomena.cz/api/*"
# zone_name = "vasedomena.cz"
